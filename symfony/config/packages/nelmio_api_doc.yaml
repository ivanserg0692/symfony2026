nelmio_api_doc:
    html_config:
        assets_mode: offline
    documentation:
        info:
            title: Symfony2026 API
            description: API documentation for version 1 endpoints.
            version: 1.0.0
        components:
            securitySchemes:
                bearerAuth:
                    type: http
                    scheme: bearer
                    bearerFormat: JWT
    areas:
        default:
            path_patterns:
                - ^/api/v1(?!/doc(?:\.json)?$)
