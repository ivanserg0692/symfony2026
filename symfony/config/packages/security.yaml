security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    role_hierarchy:
        # Base application role for any authenticated user
        ROLE_USER: ~

        # Administrative role with all user permissions included
        ROLE_ADMIN: [ ROLE_USER ]

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        # used to reload user from session & other features (e.g. switch_user)
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        login:
            pattern: ^/api/v1/auth/login$
            stateless: true
            provider: app_user_provider
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'
            custom_authenticators:
                - App\Security\JwtLoginAuthenticator
        token_refresh:
            pattern: ^/api/v1/auth/(refresh|logout)$
            stateless: true
            provider: app_user_provider
            refresh_jwt:
                check_path: api_v1_auth_refresh
            logout:
                path: api_v1_auth_logout
                delete_cookies:
                    AUTH_TOKEN:
                        path: /
                    refresh_token:
                        path: /api/v1/auth
        api:
            pattern: ^/api/v1
            stateless: true
            provider: app_user_provider
            jwt: ~
        main:
            lazy: true
            provider: app_user_provider
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'
            custom_authenticators:
                - App\Security\AdminLoginFormAuthenticator
            logout:
                path: app_logout
                enable_csrf: true
                csrf_token_id: logout_form
                # where to redirect after logout
                # target: app_any_route

            # Activate different ways to authenticate:
            # https://symfony.com/doc/current/security.html#the-firewall

            # https://symfony.com/doc/current/security/impersonating_user.html
            # switch_user: true

    # Note: Only the *first* matching rule is applied
    access_control:
        - { path: ^/login$, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/v1/auth/csrf$, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/auth/login$, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/auth/refresh$, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/auth/logout$, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/ping$, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/auth/me$, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
