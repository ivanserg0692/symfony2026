services:
  database:
    image: postgres:16-alpine
    container_name: symfony-db
    env_file:
      - .env.local
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d app -U app"]
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - database_data:/var/lib/postgresql/data

  symfony-cli: &symfony-base
    build:
      context: .
      dockerfile: docker/php-symfony-cli/Dockerfile
      args:
        UBUNTU_VERSION: "24.04"
    image: symfony-cli:dev
    container_name: symfony-cli
    working_dir: /workspace
    volumes:
      - ./symfony:/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env.local
    environment:
      GIT_AUTHOR_NAME: ${GIT_AUTHOR_NAME:-}
      GIT_AUTHOR_EMAIL: ${GIT_AUTHOR_EMAIL:-}
      GIT_COMMITTER_NAME: ${GIT_COMMITTER_NAME:-}
      GIT_COMMITTER_EMAIL: ${GIT_COMMITTER_EMAIL:-}
    entrypoint:
      - /usr/local/bin/symfony-entrypoint
    command:
      - bash
    stdin_open: true
    tty: true

  symfony-web:
    <<: *symfony-base
    container_name: symfony-web
    command:
      - sh
      - -lc
      - /root/.symfony5/bin/symfony server:stop || true; /root/.symfony5/bin/symfony serve --allow-http --no-tls --listen-ip=0.0.0.0 --port=8000 --daemon; exec tail -f /dev/null
    ports:
      - "8000:8000"
    stdin_open: false
    tty: false

  mailpit:
    image: axllent/mailpit:latest
    container_name: symfony-mailpit
    command: ["--smtp-max-recipients", "1000"]
    ports:
      - "8025:8025"

  rabbitmq:
    image: rabbitmq:4-management
    container_name: symfony-rabbitmq
    env_file:
      - .env.local
    ports:
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  minio:
    image: quay.io/minio/minio:latest
    container_name: symfony-minio
    env_file:
      - .env.local
    command: server /data --console-address ":9001"
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - minio_data:/data

  minio-client:
    image: quay.io/minio/mc:latest
    env_file:
      - .env.local
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - sh
      - -lc
      - mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" >/dev/null && exec mc "$$@"
      - mc

  plantuml:
    image: plantuml/plantuml:1.2025.2
    working_dir: /workspace
    volumes:
      - .:/workspace

volumes:
  database_data:
  rabbitmq_data:
  minio_data:
